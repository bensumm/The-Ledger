# Non-gating repo checks (gating once branch protection / merge queue lands).
# Runs the same checks agents run locally (CLAUDE.md rule 2 + the auto-discovered test suites):
# nothing here needs secrets or Ben's machine — the fills *sync* itself can never
# move to CI (it reads ~/.runelite locally; Task Scheduler is its permanent home).
name: checks

on:
  push:
    branches: [main]
  pull_request:
  merge_group:
  workflow_dispatch:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Syntax check all JS modules
        run: |
          set -e
          for f in js/*.js pipeline/*.mjs pipeline/lib/*.mjs; do
            node --check "$f"
          done
          echo "syntax OK"

      - name: acceptance fixtures (auto-discovered *.test.mjs)
        run: node pipeline/run-tests.mjs

      - name: import-resolution (entrypoint imports resolve against module exports)
        run: node pipeline/check-imports.mjs

      - name: dead-export (no export kept alive only by its own test — RC-A vestigial-code guard)
        run: node pipeline/check-dead-exports.mjs

      - name: archlint (every file ARCHITECTURE.md names resolves on disk — doc-reference guard E7)
        run: node pipeline/lint-arch.mjs

      - name: skill-lint (every SKILL.md rule-block tagged, P7)
        run: node pipeline/lint-skills.mjs

      - name: doc-lint (denylist of superseded terms + single-source duplicate-phrase, DL1)
        run: node pipeline/lint-docs.mjs

      - name: fills.json / positions.json parse
        run: |
          node -e "
            const fs = require('fs');
            for (const f of ['fills.json','positions.json']) {
              JSON.parse(fs.readFileSync(f,'utf8'));
              console.log(f, 'OK');
            }
          "

  # Browser DOM smoke (CI1): the cheap `checks` job above only proves syntax + pure logic.
  # This loads index.html in headless chromium with ALL external network stubbed and fails on
  # any page error / app console error / empty pane — the "syntax passed but the app broke"
  # class the process rules warn about. Separate job so the cheap checks still fail fast.
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Playwright + chromium
        run: |
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Browser DOM smoke
        run: node pipeline/smoke-test.mjs
