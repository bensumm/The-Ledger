# Non-gating repo checks (gating once branch protection / merge queue lands).
# Runs the same checks agents run locally (CLAUDE.md rule 2 + quotecore fixtures):
# nothing here needs secrets or Ben's machine — the fills *sync* itself can never
# move to CI (it reads ~/.runelite locally; Task Scheduler is its permanent home).
name: checks

on:
  push:
    branches: [main]
  pull_request:
  merge_group:
  workflow_dispatch:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Syntax check all JS modules
        run: |
          set -e
          for f in js/*.js pipeline/*.mjs; do
            node --check "$f"
          done
          echo "syntax OK"

      - name: quotecore acceptance fixtures
        run: node pipeline/quotecore.test.mjs

      - name: reconstruction acceptance fixtures
        run: node pipeline/reconstruct.test.mjs

      - name: fills.json / positions.json parse
        run: |
          node -e "
            const fs = require('fs');
            for (const f of ['fills.json','positions.json']) {
              JSON.parse(fs.readFileSync(f,'utf8'));
              console.log(f, 'OK');
            }
          "
